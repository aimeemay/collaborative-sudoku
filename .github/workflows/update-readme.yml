name: Update README on commit

on:
    push:
        branches:
            - main

jobs:
    update-readme:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            issues: write

        steps:
            - name: Ensure documentation label exists
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh label create "documentation" \
                    --repo "${{ github.repository }}" \
                    --description "Improvements or additions to docs" \
                    --color "0075ca" || true

            - name: Create README update task for Copilot
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  COMMIT_SHA: ${{ github.sha }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
                  COMMIT_URL: ${{ github.event.head_commit.url }}
                  COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
              run: |
                  SHORT_SHA="${COMMIT_SHA:0:7}"
                  ISSUE_BODY="Hey Copilot! 👋 A new commit just landed on \`main\`. Please update \`README.md\` if anything changed that players or contributors would want to know about.

                  **Commit:** [\`${SHORT_SHA}\`](${COMMIT_URL})
                  **Author:** ${COMMIT_AUTHOR}

                  **Commit message:**
                  ${COMMIT_MSG}

                  Use the [readme-updater agent instructions](.github/agents/readme-updater.agent.md) to guide your tone and what to update. Keep it playful and minimal ✨

                  If the README doesn't need updating for this commit, just close this issue with a note."

                  gh issue create \
                    --repo "${{ github.repository }}" \
                    --title "docs: update README for \`${SHORT_SHA}\` ✨" \
                    --body "$ISSUE_BODY" \
                    --assignee "copilot" \
                    --label "documentation"
