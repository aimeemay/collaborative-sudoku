# Fly.io config for the Tinylicious Fluid relay.
# App name must be globally unique on Fly; `fly launch` will confirm/replace it.
app = "collaborative-sudoku-relay"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 7070
  force_https = true
  # Keep the relay always-on so in-progress rooms are not dropped.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
