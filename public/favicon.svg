<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Co-Sudoku: warm squircle tile + 3x3 grid with collaborative player tokens -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="#f5f0e8"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="14.5" fill="none" stroke="#b4a58c" stroke-opacity="0.35"/>

  <!-- playful collaborative tokens (player colors) -->
  <rect x="13" y="13" width="11" height="11" rx="3.5" fill="#6b8cba"/>
  <rect x="40" y="13" width="11" height="11" rx="3.5" fill="#a8893a"/>
  <rect x="26.5" y="26.5" width="11" height="11" rx="3.5" fill="#b87070"/>
  <rect x="13" y="40" width="11" height="11" rx="3.5" fill="#5a9e85"/>
  <rect x="40" y="40" width="11" height="11" rx="3.5" fill="#8a73b5"/>

  <!-- 3x3 grid lines -->
  <g stroke="#8b7355" stroke-opacity="0.55" stroke-width="1.6" stroke-linecap="round">
    <line x1="23.3" y1="13" x2="23.3" y2="51"/>
    <line x1="40.7" y1="13" x2="40.7" y2="51"/>
    <line x1="13" y1="23.3" x2="51" y2="23.3"/>
    <line x1="13" y1="40.7" x2="51" y2="40.7"/>
  </g>
</svg>
